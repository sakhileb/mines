name: Sentry Release Tagging

on:
  push:
    branches: [ main ]

jobs:
  sentry-release:
    runs-on: ubuntu-latest
    outputs:
      sentry_release: ${{ steps.set_release.outputs.release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set SENTRY_RELEASE
        id: set_release
        run: |
          RELEASE=$(echo "${GITHUB_SHA:-$(git rev-parse --short HEAD)}" | cut -c1-40)
          echo "release=$RELEASE" >> $GITHUB_OUTPUT
          echo "SENTRY_RELEASE=$RELEASE"

      - name: Create Sentry release (optional)
        if: ${{ secrets.SENTRY_AUTH_TOKEN != '' }}
        uses: getsentry/action-release@v1
        with:
          sentry_auth_token: ${{ secrets.SENTRY_AUTH_TOKEN }}
          environment: production
          ref: ${{ github.sha }}
          projects: ''

      - name: Upload Sentry releases env for downstream jobs
        run: |
          echo "Set SENTRY_RELEASE=$RELEASE for deployment steps"
name: Sentry - Create Release on Deploy

on:
  push:
    branches: [ main ]

jobs:
  sentry-release:
    runs-on: ubuntu-latest
    if: ${{ secrets.SENTRY_AUTH_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Create Sentry release
        uses: getsentry/action-release@v1
        with:
          environment: production
          org: ${{ secrets.SENTRY_ORG }}
          project: ${{ secrets.SENTRY_PROJECT }}
          authToken: ${{ secrets.SENTRY_AUTH_TOKEN }}
          ref: ${{ github.sha }}
          name: ${{ github.sha }}
