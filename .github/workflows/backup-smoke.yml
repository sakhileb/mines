name: Backup Smoke Test (Protected)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 0' # weekly on Sunday 03:00 UTC

jobs:
  backup-smoke:
    name: S3 Backup Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.AWS_ACCESS_KEY_ID }}" ] || [ -z "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ] || [ -z "${{ secrets.AWS_BUCKET }}" ] || [ -z "${{ secrets.S3_KMS_KEY_ID }}" ]; then
            echo "Required AWS secrets are not set. Set AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_BUCKET and S3_KMS_KEY_ID in repository secrets.";
            exit 1;
          fi
      - name: Setup AWS CLI
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'us-east-1' }}
      - name: Run backup script
        env:
          AWS_BUCKET: ${{ secrets.AWS_BUCKET }}
          S3_KMS_KEY_ID: ${{ secrets.S3_KMS_KEY_ID }}
        run: |
          chmod +x scripts/backup-db.sh
          ./scripts/backup-db.sh || (echo "Backup script failed"; exit 1)
