name: OWASP ZAP - Baseline Scan (non-prod)

on:
  schedule:
    - cron: '0 3 * * *' # daily at 03:00 UTC
  workflow_dispatch:

env:
  ZAP_TARGET: ${{ secrets.ZAP_TARGET_URL }}
  ZAP_AUTH_ENABLED: ${{ secrets.ZAP_AUTH_ENABLED }}
  ZAP_AUTH_URL: ${{ secrets.ZAP_AUTH_URL }}
  ZAP_AUTH_USERNAME: ${{ secrets.ZAP_AUTH_USERNAME }}
  ZAP_AUTH_PASSWORD: ${{ secrets.ZAP_AUTH_PASSWORD }}

jobs:
  zap-baseline:
    name: ZAP Baseline Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require target
        run: |
          if [ -z "${ZAP_TARGET}" ]; then echo "ZAP_TARGET_URL secret is not set; aborting"; exit 1; fi

      - name: Run ZAP baseline docker scan
        run: |
          docker run --rm -v $(pwd):/zap/wrk/:rw -t owasp/zap2docker-stable zap-baseline.py -t "${ZAP_TARGET}" -r zap-report.html -I || true

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: zap-report.html

      - name: Check for high/medium alerts and create issue
        id: find_issues
        run: |
          if grep -E "High|Medium" zap-report.html >/dev/null 2>&1; then
            echo "alerts_found=true" >> $GITHUB_OUTPUT
            echo "Found potential security issues in ZAP report"
          else
            echo "alerts_found=false" >> $GITHUB_OUTPUT
            echo "No high/medium alerts found"
          fi

      - name: Create triage issue when alerts found
        if: steps.find_issues.outputs.alerts_found == 'true'
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: "[Security][ZAP] Potential findings for ${ZAP_TARGET}"
          content-filepath: zap-report.html
          labels: security, zap, triage

  zap-authenticated:
    name: ZAP Authenticated Scan
    runs-on: ubuntu-latest
    if: env.ZAP_AUTH_ENABLED == 'true'
    needs: zap-baseline
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Require auth config
        run: |
          if [ -z "${ZAP_AUTH_URL}" ] || [ -z "${ZAP_AUTH_USERNAME}" ] || [ -z "${ZAP_AUTH_PASSWORD}" ]; then
            echo "Authenticated ZAP scan secrets not set; aborting"; exit 1;
          fi

      - name: Run ZAP full scan (authenticated)
        env:
          ZAP_TARGET_AUTH: ${{ env.ZAP_AUTH_URL }}
        run: |
          # NOTE: Authenticated scans require a runner with network access to staging and
          # may require a session/context to be created. The simplest approach is to run
          # zap-full-scan.py against an auth-capable endpoint that accepts basic auth headers.
          docker run --rm -v $(pwd):/zap/wrk/:rw -t owasp/zap2docker-stable \
            zap-full-scan.py -t "${ZAP_TARGET_AUTH}" -j zap-auth-report.json -r zap-auth-report.html || true

      - name: Upload authenticated ZAP report
        uses: actions/upload-artifact@v4
        with:
          name: zap-auth-report
          path: zap-auth-report.html

      - name: Create triage issue when auth alerts found
        id: find_auth_issues
        run: |
          if grep -E "High|Medium" zap-auth-report.html >/dev/null 2>&1; then
            echo "alerts_found=true" >> $GITHUB_OUTPUT
            echo "Found potential security issues in authenticated ZAP report"
          else
            echo "alerts_found=false" >> $GITHUB_OUTPUT
            echo "No high/medium alerts found"
          fi

      - name: Create triage issue for authenticated scan
        if: steps.find_auth_issues.outputs.alerts_found == 'true'
        uses: peter-evans/create-issue-from-file@v4
        with:
          title: "[Security][ZAP][Auth] Potential findings for ${ZAP_TARGET_AUTH}"
          content-filepath: zap-auth-report.html
          labels: security, zap, triage, auth
