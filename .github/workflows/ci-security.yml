name: CI - Security & Static Analysis

on:
  push:
    branches: [ '**' ]
  pull_request:

jobs:
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run gitleaks
        uses: zricethezav/gitleaks-action@v1
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  composer-audit:
    name: Composer audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3.16'

      - name: Disable Xdebug if present
        run: |
          if php -m | grep -q "xdebug"; then
            echo "Xdebug found; attempting to disable via phpdismod"
            sudo phpdismod xdebug || true
          fi
          # Fail if Xdebug remains enabled to avoid noisy CI and false positives
          if php -m | grep -q "xdebug"; then
            echo "Xdebug is enabled in the CI image; failing build."; php -i | grep -i xdebug || true; exit 1
          fi
      - name: Install composer deps
        run: composer install --no-interaction --no-progress --prefer-dist
        env:
          BROADCAST_DRIVER: log
      - name: Run composer audit
        run: |
          if ! composer audit --format=plain; then
            echo "Composer audit found security advisories"
            exit 1
          fi

  npm-audit:
    name: NPM audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Node dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci --silent; elif [ -f package.json ]; then npm install --silent; fi
      - name: Run npm audit
        run: |
          if [ -f package.json ]; then
            npm audit --audit-level=moderate || exit 1
          else
            echo "No package.json present, skipping npm audit"
          fi

  semgrep:
    name: Semgrep security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: 'p/ci'

  static-php:
    name: PHP static checks (phpstan/psalm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3.16'

      - name: Disable Xdebug if present
        run: |
          if php -m | grep -q "xdebug"; then
            sudo phpdismod xdebug || true
          fi
      - name: Install composer deps
        run: composer install --no-interaction --no-progress --prefer-dist
        env:
          BROADCAST_DRIVER: log
      - name: Run PHPStan if available
        run: |
          if [ -x vendor/bin/phpstan ]; then
            # Run analysis using provided config. If there are errors and no baseline exists,
            # generate a baseline for maintainers to review and fail the job so a baseline PR can be created.
            if vendor/bin/phpstan analyse --configuration=phpstan.neon.dist --no-progress; then
              echo "PHPStan passed";
            else
              if [ ! -f phpstan-baseline.neon ]; then
                echo "PHPStan detected issues; generating baseline phpstan-baseline.neon for review.";
                vendor/bin/phpstan analyse --configuration=phpstan.neon.dist --generate-baseline=phpstan-baseline.neon --no-progress || true
                echo "A baseline was generated at phpstan-baseline.neon. Please review and commit it to suppress existing errors.";
              fi
              exit 1
            fi
          else
            echo "phpstan not installed, skipping";
          fi
      - name: Run Psalm if available
        run: |
          if [ -x vendor/bin/psalm ]; then
            vendor/bin/psalm --show-info=false || exit 1
          else
            echo "psalm not installed, skipping";
          fi

      - name: Run PHPCBF (auto-fix) if available
        run: |
          if [ -x vendor/bin/phpcbf ]; then
            echo "Running phpcbf to apply safe fixes..."
            vendor/bin/phpcbf --standard=PSR12 --extensions=php --ignore=vendor || true
          else
            echo "phpcbf not installed, skipping auto-fix";
          fi

      - name: Run PHPCS and fail on violations
        run: |
          if [ -x vendor/bin/phpcs ]; then
            vendor/bin/phpcs --standard=PSR12 --extensions=php --ignore=vendor || exit 1
          else
            echo "phpcs not installed, skipping";
          fi

      - name: Scan Blade templates for unescaped output
        run: |
          if php -v >/dev/null 2>&1; then
            php artisan scan:blade-unescaped || { echo 'Unescaped Blade outputs found'; exit 1; }
          else
            echo 'PHP not available, skipping blade scan';
          fi

      - name: Semgrep Blade XSS rules
        uses: returntocorp/semgrep-action@v1
        with:
          config: '.semgrep/xss_rules.yml'