name: Verify S3 Storage

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  verify-s3:
    name: Verify S3 (requires secrets)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Disable Xdebug if present
        run: |
          if php -m | grep -q "xdebug"; then
            sudo phpdismod xdebug || true
          fi

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-ansi --no-progress --prefer-dist

      - name: Run S3 verification
        env:
          APP_ENV: production
          APP_DEBUG: 'false'
          APP_KEY: ${{ secrets.APP_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          AWS_BUCKET: ${{ secrets.AWS_BUCKET }}
          FILESYSTEM_DISK: s3
        run: |
          php artisan storage:verify-s3 --disk=s3 --no-interaction

# Notes:
# - This workflow requires the repository to have the following secrets configured:
#   APP_KEY, AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_DEFAULT_REGION, AWS_BUCKET
# - Run manually via the Actions tab or on push to main. It is intended for CI-time
#   verification during deploys; do not expose long-lived credentials in PRs.
