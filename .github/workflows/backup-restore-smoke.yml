name: Backup Restore Smoke Test

on:
  schedule:
    - cron: '0 4 * * 1' # weekly on Monday at 04:00 UTC
  workflow_dispatch:

jobs:
  verify-backups:
    name: Verify backup encryption and optionally restore
    runs-on: ubuntu-latest
    environment: backups
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS CLI
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.BACKUP_AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.BACKUP_AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.BACKUP_AWS_REGION }}

      - name: Find latest backup object
        id: latest
        run: |
          if [ -z "${{ secrets.BACKUP_S3_BUCKET }}" ]; then echo "BACKUP_S3_BUCKET not set"; exit 1; fi
          LATEST=$(aws s3api list-objects --bucket "${{ secrets.BACKUP_S3_BUCKET }}" --prefix "backups/" --query 'reverse(sort_by(Contents,&LastModified))[0].Key' --output text)
          if [ -z "$LATEST" ] || [ "$LATEST" = "None" ]; then echo "No backups found"; exit 1; fi
          echo "latest_key=$LATEST" >> $GITHUB_OUTPUT

      - name: Check server-side encryption (SSE-KMS)
        run: |
          KEY=${{ steps.latest.outputs.latest_key }}
          echo "Checking object: $KEY"
          head=$(aws s3api head-object --bucket "${{ secrets.BACKUP_S3_BUCKET }}" --key "$KEY" --query '{SSE:ServerSideEncryption,KMS:ServerSideEncryption, KMSKeyId: SSEKMSKeyId}' --output json) || true
          echo "$head"
          # Verify SSE is aws:kms (head-object may include SSEKMSKeyId)
          SSE=$(echo "$head" | jq -r '.ServerSideEncryption // empty') || true
          KID=$(echo "$head" | jq -r '.SSEKMSKeyId // empty') || true
          if [ -z "$SSE" ] || [ "$SSE" != "aws:kms" ]; then
            echo "Backup object is not encrypted with AWS KMS"; exit 1
          fi
          if [ -n "${{ secrets.S3_KMS_KEY_ID }}" ] && [ "$KID" != "${{ secrets.S3_KMS_KEY_ID }}" ]; then
            echo "Backup object KMS key does not match expected S3_KMS_KEY_ID"; exit 1
          fi

      - name: Optional: attempt restore (requires RESTORE_* secrets)
        if: ${{ secrets.RESTORE_DB_HOST && secrets.RESTORE_DB_PASSWORD }}
        run: |
          KEY=${{ steps.latest.outputs.latest_key }}
          aws s3 cp "s3://${{ secrets.BACKUP_S3_BUCKET }}/$KEY" /tmp/backup.sql.gz
          chmod +x scripts/restore-db.sh || true
          export DB_HOST=${{ secrets.RESTORE_DB_HOST }}
          export DB_PORT=${{ secrets.RESTORE_DB_PORT }}
          export DB_DATABASE=${{ secrets.RESTORE_DB_DATABASE }}
          export DB_USERNAME=${{ secrets.RESTORE_DB_USERNAME }}
          export DB_PASSWORD=${{ secrets.RESTORE_DB_PASSWORD }}
          ./scripts/restore-db.sh /tmp/backup.sql.gz || (echo "Restore failed"; exit 1)

      - name: Notify on failure (create issue)
        if: failure()
        uses: peter-evans/create-issue@v4
        with:
          title: "[Backup][Smoke] Backup verification failed"
          body: |
            The scheduled backup verification workflow failed. Please review the workflow run artifacts and logs.
          labels: backup, incident
