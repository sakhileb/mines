name: Composer Security & Validate

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-composer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v4
        with:
          php-version: '8.2'

      - name: Disable Xdebug if present
        run: |
          if php -m | grep -q "xdebug"; then
            sudo phpdismod xdebug || true
          fi

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y unzip git

      - name: Install composer
        uses: php-actions/composer@v6

      - name: Composer validate
        run: composer validate --no-interaction --strict

      - name: Ensure composer.lock in sync
        run: |
          composer update --lock --no-interaction
          if ! git diff --quiet composer.lock; then
            echo "composer.lock is out of date with composer.json. Run 'composer update --lock' and commit the result." >&2
            git --no-pager diff -- composer.lock || true
            exit 1
          fi

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Composer audit
        run: composer audit --format=plain || true

      - name: Run PHP static analyzers if available
        run: |
          if [ -x vendor/bin/phpstan ]; then
            vendor/bin/phpstan analyse --no-progress || true
          else
            echo "phpstan not installed; skipping"
          fi
          if [ -x vendor/bin/psalm ]; then
            vendor/bin/psalm --no-cache || true
          else
            echo "psalm not installed; skipping"
          fi
